<!DOCTYPE html>
<html>
<head>
  <title>API Test</title>
</head>
<body>

<h2>Test Verify API</h2>

<input id="keyInput" placeholder="Enter key (or leave empty)">
<button onclick="callAPI()">Send Request</button>

<pre id="output"></pre>

<script>
function randomKey() {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  const part = len => Array.from({length: len}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
  return `KW-${part(4)}-${part(8)}-${part(4)}`;
}

function callAPI() {
  let key = document.getElementById("keyInput").value;
  if (!key) key = randomKey();

  fetch(`/.netlify/functions/verify?key=${key}`)
    .then(res => res.json())
    .then(data => {
      document.getElementById("output").textContent =
        JSON.stringify(data, null, 2);
    })
    .catch(err => {
      document.getElementById("output").textContent = "Error: " + err;
    });
}
</script>

</body>
</html>
